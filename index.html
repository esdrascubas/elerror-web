<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo con Puntos — Repulsión elegante (12/2) · Tunable</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  


 <div class="snap-container">
    <section id="home" class="snap-section h-100 d-flex justify-content-center align-items-center">
      <video class="bg-video" onloadstart="this.playbackRate = 1;" src="https://videos.pexels.com/video-files/9694806/9694806-hd_1920_1080_25fps.mp4" autoplay="" muted="" loop="" playsinline="" preload="auto" style="opacity: 1;"></video>
      <canvas id="logoCanvas"></canvas>
    </section>
    <section id="video" class="snap-section d-flex justify-content-center align-items-center">
      <video class="bg-video" onloadstart="this.playbackRate = 1;" src="https://videos.pexels.com/video-files/8875671/8875671-uhd_2732_1440_25fps.mp4" autoplay="" muted="" loop="" playsinline="" preload="auto" style="opacity: 1;"></video>
      
      <div class="container h-100 d-flex align-items-center">
        <div class="row g-4 justify-content-center w-100">
          <!-- Thumbnail 1 -->
          <div class="col-11 col-sm-10 col-md-6 col-lg-5 col-xl-5">
            <a href="#" class="video-thumbnail-link" data-video-id="GtXWiOKG2Bk">
              <div class="ratio ratio-16x9 video-thumbnail-wrapper">
                <img src="https://img.youtube.com/vi/GtXWiOKG2Bk/maxresdefault.jpg" 
                     class="img-fluid rounded shadow-lg video-thumbnail" 
                     alt="Video thumbnail 1">
              </div>
            </a>
            <h5 class="text-white text-center mt-3">Caballos - Directo Rockville 2025.04.12</h5>
          </div>
          <!-- Thumbnail 2 -->
          <div class="col-11 col-sm-10 col-md-6 col-lg-5 col-xl-5">
            <a href="#" class="video-thumbnail-link" data-video-id="_AUZJDnTmLw">
              <div class="ratio ratio-16x9 video-thumbnail-wrapper">
                <img src="https://img.youtube.com/vi/_AUZJDnTmLw/maxresdefault.jpg" 
                     class="img-fluid rounded shadow-lg video-thumbnail" 
                     alt="Video thumbnail 2">
              </div>
            </a>
            <h5 class="text-white text-center mt-3">Voy en bici - videoclip</h5>
          </div>
        </div>
      </div>
    </section>
    <!-- <section id="audio" class="snap-section d-flex"> -->
    <section id="audio" class="snap-section d-flex">

      <video class="bg-video" src="https://videos.pexels.com/video-files/4380097/4380097-hd_1920_1080_30fps.mp4"
         autoplay muted loop playsinline preload="auto" ></video>

      <div class="container m-5">
        <h1>audio</h1>
        <iframe style="border: 0; width: 350px; height: 654px;" src="https://bandcamp.com/EmbeddedPlayer/album=3751592885/size=large/bgcol=ffffff/linkcol=e99708/transparent=true/" seamless><a href="https://anginedepoitrine.bandcamp.com/album/angine-de-poitrine-vol-1">ANGINE DE POITRINE - VOL.1 de Angine de Poitrine</a></iframe>
      </div>
    </section>
    <!-- añade más <section class="snap-section"> según necesites -->
  </div>

  <!-- Navegación opcional (vacía, sin texto) -->
  <div class="nav-controls">
    <button type="button" class="btn-prev" aria-label="Anterior"></button>
    <button type="button" class="btn-next" aria-label="Siguiente"></button>
  </div>



  <div class="menuToggle" style="display: none;"><input id="togglePanel" type="checkbox"><label for="togglePanel">Mostrar opciones</label></div>
  <div class="panel">
    <div class="row"><strong>Repulsión elegante (12/2)</strong></div>
    <div class="row"><label>Paso (tamaño malla)</label><input id="step" type="range" min="2" max="48" value="12" step="1"><span id="stepVal" class="val">12 px</span></div>
    <div class="row"><label>Radio del punto</label><input id="dotR" type="range" min="1" max="10" value="2" step="1"><span id="dotRVal" class="val">2 px</span></div>
    <div class="row"><label>Radio de influencia</label><input id="effR" type="range" min="1" max="50" value="30" step="1"><span id="effRVal" class="val">30 px</span></div>
    <div class="row"><label>Perfil de influencia (Lineal ↔ Gauss)</label><input id="falloff" type="range" min="0" max="1" value="0.5" step="0.01"><span id="falloffVal" class="val">50%</span></div>
    <div class="row"><label>Velocidad de alejarse</label><input id="push" type="range" min="0.5" max="3" value="1" step="0.05"><span id="pushVal" class="val">×1.00</span></div>
    <div class="row"><label>Velocidad de retorno</label><input id="ret" type="range" min="0.5" max="3" value="1" step="0.05"><span id="retVal" class="val">×1.00</span></div>
  </div>


<!-- Menú inferior -->
<nav id="bottomMenu" class="bottom-menu">
  <button class="icon-btn" onclick="goToSection(0)"><i class="bi bi-diamond"></i></button>
  <button class="icon-btn" onclick="goToSection(1)"><i class="bi bi-hexagon"></i></button>
  <button class="icon-btn" onclick="goToSection(2)"><i class="bi bi-octagon"></i></button>
</nav>


  <script src="js/lib/dotsRenderer.js"></script>
  <script src="js/app.js"></script>
  <script src="js/lib/nav.js"></script>
  <script src="js/lib/videoModal.js"></script>

 
<!-- Modal de Video -->
<div class="modal fade video-modal" id="videoModal" tabindex="-1" aria-labelledby="videoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      <div class="modal-body">
        <div class="ratio ratio-16x9">
          <iframe id="videoIframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>
</div>




</body>
</html>
